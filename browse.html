<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Companions | Pawsitive Hearts</title>
    <style>
        /* --- CSS VARIABLES & THEMING --- */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #06b6d4;
            --background: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 24px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.4);
        }

        /* --- BASE STYLES --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            transition: var(--transition);
            line-height: 1.6;
        }

        a { text-decoration: none; color: inherit; }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            font-weight: 600;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
        }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }

        /* --- HEADER --- */
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            transition: var(--transition);
        }
        [data-theme="dark"] .header { background-color: rgba(15, 23, 42, 0.8); }

        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu { display: flex; gap: 32px; list-style: none; }
        .nav-link { font-weight: 500; color: var(--text-muted); transition: var(--transition); }
        .nav-link:hover, .nav-link.active { color: var(--text); }

        .nav-actions { display: flex; align-items: center; gap: 16px; }
        .theme-toggle, .menu-toggle {
            background: none; border: none; font-size: 1.25rem; cursor: pointer; color: var(--text); padding: 8px; border-radius: 50%;
        }
        .menu-toggle { display: none; }

        /* --- BROWSE WORKSPACE INTERFACE --- */
        .browse-workspace {
            padding-top: 120px;
            padding-bottom: 80px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 32px;
        }

        /* --- SIDEBAR FILTERS --- */
        .filter-sidebar {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 24px;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .filter-section {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .filter-section:last-child {
            margin-bottom: 0; padding-bottom: 0; border-bottom: none;
        }

        .filter-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .checkbox-label:hover {
            color: var(--text);
        }

        .checkbox-label input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* --- CONTENT MAIN WORKSPACE --- */
        .catalog-container {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .search-bar-wrapper {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow);
        }

        .search-input {
            width: 100%;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 1rem;
            outline: none;
        }

        .search-input::placeholder { color: var(--text-muted); }

        .results-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* --- COMPANION CARDS GRID --- */
        .pets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .pet-card {
            background-color: var(--surface);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }

        .pet-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
        }

        .pet-image-wrapper {
            position: relative;
            height: 220px;
            overflow: hidden;
        }

        .pet-img { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); }
        .pet-card:hover .pet-img { transform: scale(1.04); }

        .pet-tag {
            position: absolute; top: 12px; left: 12px;
            background-color: rgba(15, 23, 42, 0.75); backdrop-filter: blur(4px);
            color: white; padding: 4px 10px; border-radius: 100px; font-size: 0.75rem; font-weight: 600;
        }

        .pet-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .pet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .pet-name { font-size: 1.25rem; font-weight: 700; }
        .pet-age { color: var(--primary); font-weight: 600; font-size: 0.85rem; background-color: rgba(79, 70, 229, 0.1); padding: 2px 8px; border-radius: 100px; }
        .pet-details { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 16px; }
        .pet-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); }
        .pet-location { color: var(--text-muted); font-size: 0.85rem; }

        /* --- SKELETON LOADING --- */
        .skeleton {
            background: linear-gradient(90deg, var(--border) 25%, var(--background) 50%, var(--border) 75%);
            background-size: 200% 100%;
            animation: loadingSkeleton 1.5s infinite;
        }

        @keyframes loadingSkeleton {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* --- TOAST --- */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 12px; }
        .toast { background-color: var(--surface); color: var(--text); padding: 16px 24px; border-radius: var(--radius-md); box-shadow: var(--shadow-lg); border-left: 4px solid var(--primary); transform: translateX(120%); transition: transform 0.4s ease; }
        .toast.show { transform: translateX(0); }

        /* --- MOBILE FILTERS ACTION BAR --- */
        .mobile-filter-bar { display: none; margin-bottom: 16px; }

        /* --- RESPONSIVE WORKSPACE --- */
        @media (max-width: 968px) {
            .browse-workspace { grid-template-columns: 1fr; }
            .filter-sidebar { display: none; }
            .filter-sidebar.active-drawer {
                display: block; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                z-index: 1010; height: 100vh; overflow-y: auto; background-color: var(--surface);
            }
            .mobile-filter-bar { display: flex; justify-content: space-between; }
        }

        @media (max-width: 768px) {
            .nav-menu { position: fixed; top: 80px; left: -100%; width: 100%; height: calc(100vh - 80px); background-color: var(--surface); flex-direction: column; padding: 40px; gap: 24px; transition: var(--transition); border-top: 1px solid var(--border); }
            .nav-menu.active { left: 0; }
            .menu-toggle { display: block; }
        }
    </style>
</head>
<body>

    <div id="toast-container" class="toast-container"></div>

    <header class="header">
        <div class="container navbar">
            <a href="index.html" class="logo">🐾 Pawsitive Hearts</a>
            <nav>
                <ul class="nav-menu" id="nav-menu">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="browse.html" class="nav-link active">Browse Pets</a></li>
                    <li><a href="shelters.html" class="nav-link">Shelters</a></li>
                    <li><a href="care-guide.html" class="nav-link">Care Guide</a></li>
                    <li><a href="stories.html" class="nav-link">Stories</a></li>
                </ul>
            </nav>
            <div class="nav-actions">
                <button class="theme-toggle" id="theme-toggle">🌓</button>
                <a href="dashboard.html" class="btn btn-primary" style="padding: 8px 16px; font-size: 0.85rem;">Dashboard</a>
                <button class="menu-toggle" id="menu-toggle">☰</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="browse-workspace">
            
            <aside class="filter-sidebar" id="filter-sidebar">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;" id="drawer-close-wrapper">
                    <h3 style="font-weight: 800;">Filters</h3>
                    <button id="close-filters-btn" class="btn" style="display: none; background: var(--border);">Close</button>
                </div>

                <div class="filter-section">
                    <h4 class="filter-title">Pet Type</h4>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" name="type" value="dog"> Dogs</label>
                        <label class="checkbox-label"><input type="checkbox" name="type" value="cat"> Cats</label>
                        <label class="checkbox-label"><input type="checkbox" name="type" value="rabbit"> Rabbits</label>
                        <label class="checkbox-label"><input type="checkbox" name="type" value="bird"> Birds</label>
                    </div>
                </div>

                <div class="filter-section">
                    <h4 class="filter-title">Age Bracket</h4>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" name="age" value="baby"> Baby (< 1 year)</label>
                        <label class="checkbox-label"><input type="checkbox" name="age" value="young"> Young (1-3 years)</label>
                        <label class="checkbox-label"><input type="checkbox" name="age" value="adult"> Adult (3-7 years)</label>
                    </div>
                </div>

                <div class="filter-section">
                    <h4 class="filter-title">Gender</h4>
                    <div class="checkbox-group">
                        <label class="checkbox-label"><input type="checkbox" name="gender" value="male"> Male</label>
                        <label class="checkbox-label"><input type="checkbox" name="gender" value="female"> Female</label>
                    </div>
                </div>
            </aside>

            <main class="catalog-container">
                <div class="search-bar-wrapper">
                    <span>🔍</span>
                    <input type="text" id="live-search" class="search-input" placeholder="Search by breed, name, location or specific keywords...">
                </div>

                <div class="mobile-filter-bar">
                    <button class="btn btn-primary" id="open-filters-btn">⚙ Toggle Advanced Filters</button>
                </div>

                <div class="results-meta">
                    <p id="results-count">Showing matching companions...</p>
                </div>

                <div class="pets-grid" id="catalog-grid">
                    </div>
            </main>

        </div>
    </div>

    <script>
        // Mock Core System Database
        const PET_DATABASE = [
            { id: 1, name: "Buddy", type: "dog", ageBracket: "young", ageText: "2 Years", gender: "male", breed: "Golden Retriever", location: "Hope Shelter, NY", img: "https://images.unsplash.com/photo-1552053831-71594a27632d?auto=format&fit=crop&q=80&w=600", tag: "Urgent Adoption" },
            { id: 2, name: "Luna", type: "cat", ageBracket: "young", ageText: "1 Year", gender: "female", breed: "Siamese Cat", location: "Grace Sanctuary", img: "https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&q=80&w=600", tag: "Sweet Soul" },
            { id: 3, name: "Oliver", type: "rabbit", ageBracket: "baby", ageText: "5 Months", gender: "male", breed: "Angora Rabbit", location: "Hope Shelter, NY", img: "https://images.unsplash.com/photo-1585110396000-c9ffd4e4b308?auto=format&fit=crop&q=80&w=600", tag: "Playful" },
            { id: 4, name: "Bella", type: "dog", ageBracket: "baby", ageText: "8 Months", gender: "female", breed: "French Bulldog", location: "North Shelter", img: "https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?auto=format&fit=crop&q=80&w=600", tag: "Active Family" },
            { id: 5, name: "Milo", type: "cat", ageBracket: "adult", ageText: "4 Years", gender: "male", breed: "Tabby Cat", location: "Grace Sanctuary", img: "https://images.unsplash.com/photo-1533738363-b7f9aef128ce?auto=format&fit=crop&q=80&w=600", tag: "Calm Companion" },
            { id: 6, name: "Charlie", type: "bird", ageBracket: "young", ageText: "2 Years", gender: "male", breed: "Parrot", location: "West End Aviary", img: "https://www.bing.com/th/id/OIP.sjbgnpnGv1kMh-I7blHbEgHaLH?w=193&h=290&c=8&rs=1&qlt=90&o=6&dpr=1.3&pid=ImgAns&rm=2", tag: "Talkative" }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            // --- UI THEMING MANAGEMENT ---
            const themeToggle = document.getElementById('theme-toggle');
            document.documentElement.setAttribute('data-theme', localStorage.getItem('theme') || 'light');
            themeToggle.addEventListener('click', () => {
                const target = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', target);
                localStorage.setItem('theme', target);
            });

            // --- MOBILE NAV MENU ---
            const menuToggle = document.getElementById('menu-toggle');
            const navMenu = document.getElementById('nav-menu');
            menuToggle.addEventListener('click', () => {
                navMenu.classList.toggle('active');
            });

            // --- DEEP LINK PARAMETER PARSER ---
            const urlParams = new URLSearchParams(window.location.search);
            const initialTypeFilter = urlParams.get('type');
            if(initialTypeFilter) {
                const targetCheckbox = document.querySelector(`input[name="type"][value="${initialTypeFilter}"]`);
                if(targetCheckbox) targetCheckbox.checked = true;
            }

            // --- FILTER ELEMENTS INTERACTION ---
            const searchInput = document.getElementById('live-search');
            const checkboxes = document.querySelectorAll('.filter-sidebar input[type="checkbox"]');
            const catalogGrid = document.getElementById('catalog-grid');
            const countMeta = document.getElementById('results-count');

            // Responsive Drawer Elements
            const openFiltersBtn = document.getElementById('open-filters-btn');
            const closeFiltersBtn = document.getElementById('close-filters-btn');
            const filterSidebar = document.getElementById('filter-sidebar');

            openFiltersBtn.addEventListener('click', () => {
                filterSidebar.classList.add('active-drawer');
                closeFiltersBtn.style.display = 'block';
            });
            closeFiltersBtn.addEventListener('click', () => {
                filterSidebar.classList.remove('active-drawer');
            });

            // --- FILTER PROCESSING ENGINE ---
            function renderCatalog() {
                // Display structural loader template layout blocks
                catalogGrid.innerHTML = Array(3).fill(0).map(() => `
                    <div class="pet-card" style="height: 380px;">
                        <div class="skeleton" style="height: 220px; border-radius: var(--radius-md) var(--radius-md) 0 0;"></div>
                        <div style="padding: 20px;">
                            <div class="skeleton" style="height: 20px; width: 60%; margin-bottom: 12px; border-radius: 4px;"></div>
                            <div class="skeleton" style="height: 15px; width: 40%; border-radius: 4px;"></div>
                        </div>
                    </div>
                `).join('');

                setTimeout(() => {
                    const searchValue = searchInput.value.toLowerCase().trim();
                    
                    // Selected values maps arrays
                    const checkedTypes = Array.from(document.querySelectorAll('input[name="type"]:checked')).map(el => el.value);
                    const checkedAges = Array.from(document.querySelectorAll('input[name="age"]:checked')).map(el => el.value);
                    const checkedGenders = Array.from(document.querySelectorAll('input[name="gender"]:checked')).map(el => el.value);

                    const filteredResults = PET_DATABASE.filter(pet => {
                        const matchesSearch = pet.name.toLowerCase().includes(searchValue) || 
                                              pet.breed.toLowerCase().includes(searchValue) || 
                                              pet.location.toLowerCase().includes(searchValue);
                        
                        const matchesType = checkedTypes.length === 0 || checkedTypes.includes(pet.type);
                        const matchesAge = checkedAges.length === 0 || checkedAges.includes(pet.ageBracket);
                        const matchesGender = checkedGenders.length === 0 || checkedGenders.includes(pet.gender);

                        return matchesSearch && matchesType && matchesAge && matchesGender;
                    });

                    // Build dynamic catalog UI cards output layer
                    if(filteredResults.length === 0) {
                        catalogGrid.innerHTML = `
                            <div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-muted);">
                                <span style="font-size: 3rem;">🔍</span>
                                <h3 style="margin-top: 16px; font-weight: 700;">No Companions Match Your Criteria</h3>
                                <p style="margin-top: 8px;">Try modifying your active query parameter configurations.</p>
                            </div>
                        `;
                        countMeta.innerText = `0 active entries matched your parameters`;
                    } else {
                        catalogGrid.innerHTML = filteredResults.map(pet => `
                            <div class="pet-card">
                                <div class="pet-image-wrapper">
                                    <img src="${pet.img}" alt="${pet.name}" class="pet-img">
                                    <span class="pet-tag">${pet.tag}</span>
                                </div>
                                <div class="pet-info">
                                    <div class="pet-header">
                                        <h3 class="pet-name">${pet.name}</h3>
                                        <span class="pet-age">${pet.ageText}</span>
                                    </div>
                                    <div class="pet-details">
                                        <span>${pet.breed}</span> • <span>${pet.gender.charAt(0).toUpperCase() + pet.gender.slice(1)}</span>
                                    </div>
                                    <div class="pet-footer">
                                        <span class="pet-location">📍 ${pet.location}</span>
                                        <a href="pet-details.html?id=${pet.id}" class="btn btn-primary" style="padding: 6px 12px; font-size: 0.8rem; border-radius: 4px;">Details</a>
                                    </div>
                                </div>
                            </div>
                        `).join('');
                        countMeta.innerText = `Showing ${filteredResults.length} matching companions available`;
                    }
                }, 300); // UI frame debounce timeout context simulation
            }

            // Event Binding Layer
            searchInput.addEventListener('input', renderCatalog);
            checkboxes.forEach(box => box.addEventListener('change', renderCatalog));

            // Run initial compilation layout render loop frame setup
            renderCatalog();
        });
    </script>
</body>
</html>
